kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: osh

networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443

nodes:
  - role: control-plane
    image: kindest/node:v1.34.3

    extraPortMappings:
      - containerPort: 80
        hostPort: 8080
      - containerPort: 443
        hostPort: 8443

    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            # to host ingress-controller and control-plane pod
            node-labels: "openstack-control-plane=enabled,ingress-ready=true"

  - role: worker
    image: kindest/node:v1.34.3
    labels:
      openstack-control-plane: enabled
      openstack-compute-node: enabled
